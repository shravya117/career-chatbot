<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Career Guidance Chatbot</title>
    <!-- Add Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: #ffffff;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 600px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 90vh;
        max-height: 800px;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        text-align: center;
      }

      .header h1 {
        font-size: 24px;
        margin-bottom: 5px;
      }

      .header p {
        font-size: 14px;
        opacity: 0.9;
      }

      .setup-panel {
        padding: 20px;
        border-bottom: 1px solid #eee;
        background: #f9f9f9;
      }

      .setup-panel.hidden {
        display: none;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        font-size: 14px;
        margin-bottom: 5px;
        color: #333;
        font-weight: 500;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
      }

      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        width: 100%;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .btn-secondary {
        background: #f0f0f0;
        color: #333;
        padding: 8px 16px;
        font-size: 12px;
      }

      .btn-secondary:hover {
        background: #e0e0e0;
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: #fff;
      }

      .message {
        margin-bottom: 15px;
        display: flex;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        justify-content: flex-end;
      }

      .message-bubble {
        max-width: 75%;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.5;
        word-wrap: break-word;
      }

      .message-bubble p {
        margin-bottom: 10px;
      }
      .message-bubble p:last-child {
        margin-bottom: 0;
      }
      .message-bubble ul, .message-bubble ol {
        margin-bottom: 10px;
        padding-left: 20px;
      }
      .message-bubble li {
        margin-bottom: 5px;
      }
      .message-bubble pre {
        background: #2d2d2d;
        color: #f8f8f2;
        padding: 10px;
        border-radius: 6px;
        overflow-x: auto;
        margin-bottom: 10px;
        margin-top: 10px;
      }
      .message-bubble code {
        font-family: 'Courier New', Courier, monospace;
        background: rgba(0,0,0,0.1);
        padding: 2px 4px;
        border-radius: 4px;
        font-size: 0.9em;
      }
      .message-bubble pre code {
        background: none;
        padding: 0;
      }
      .user .message-bubble code {
        background: rgba(255,255,255,0.2);
      }
      .message-bubble h1, .message-bubble h2, .message-bubble h3, .message-bubble h4, .message-bubble h5, .message-bubble h6 {
        margin-top: 15px;
        margin-bottom: 10px;
        font-weight: 600;
        line-height: 1.3;
      }
      .message-bubble *:first-child {
        margin-top: 0;
      }
      .message-bubble table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 10px;
      }
      .message-bubble th, .message-bubble td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }
      .message-bubble th {
        background-color: rgba(0,0,0,0.05);
      }

      .user .message-bubble {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-bottom-right-radius: 4px;
      }

      .assistant .message-bubble {
        background: #f0f0f0;
        color: #333;
        border-bottom-left-radius: 4px;
      }

      .message-time {
        font-size: 12px;
        color: #999;
        margin-top: 5px;
        padding: 0 10px;
      }

      .user .message-time {
        text-align: right;
      }

      .chat-input-area {
        padding: 20px;
        border-top: 1px solid #eee;
        background: #f9f9f9;
      }

      .input-wrapper {
        display: flex;
        gap: 10px;
      }

      .chat-input-area input {
        flex: 1;
        padding: 12px 16px;
        border: 1px solid #ddd;
        border-radius: 24px;
        font-size: 14px;
        font-family: inherit;
      }

      .chat-input-area input:focus {
        outline: none;
        border-color: #667eea;
      }

      .btn-send {
        padding: 12px;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }

      .btn-send:hover {
        transform: scale(1.05);
      }

      .btn-send:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .loading {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 14px;
        color: #999;
      }

      .dot {
        width: 8px;
        height: 8px;
        background: #667eea;
        border-radius: 50%;
        animation: bounce 1.4s infinite;
      }

      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-10px);
        }
      }

      .error {
        background: #fee;
        color: #c33;
        padding: 12px 16px;
        border-radius: 6px;
        margin-bottom: 15px;
        font-size: 14px;
      }

      .status-bar {
        padding: 10px 20px;
        background: #f0f0f0;
        font-size: 12px;
        color: #666;
        border-top: 1px solid #ddd;
      }

      .new-chat-btn {
        display: block;
        margin: 10px auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Career Guidance Chatbot</h1>
        <p>Get personalized career guidance and support</p>
      </div>

      <div class="setup-panel" id="setupPanel">
        <div class="form-group">
          <label for="userName">Your Name</label>
          <input
            type="text"
            id="userName"
            placeholder="e.g., Sarah"
            value="Sarah"
          />
        </div>

        <div class="form-group">
          <label for="userBackground">Background</label>
          <input
            type="text"
            id="userBackground"
            placeholder="e.g., Marketing"
            value="Marketing"
          />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="dayNumber">Day Number</label>
            <input
              type="number"
              id="dayNumber"
              placeholder="e.g., 5"
              value="5"
              min="1"
              max="30"
            />
          </div>
          <div class="form-group">
            <label for="sessionType">Session Type</label>
            <select id="sessionType">
              <option value="career_counselor">Career Counselor</option>
              <option value="quiz_feedback">Quiz Feedback</option>
              <option value="technical_review">Technical Review</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="taskAssigned">Task Assigned</label>
            <select id="taskAssigned">
              <option value="yes">Yes</option>
              <option value="no">No</option>
            </select>
          </div>
          <div class="form-group">
            <label for="quizAssigned">Quiz Assigned</label>
            <select id="quizAssigned">
              <option value="no">No</option>
              <option value="yes">Yes</option>
            </select>
          </div>
        </div>

        <button class="btn btn-primary" id="startChatBtn">Start Chat</button>
      </div>

      <div class="chat-messages" id="messagesContainer"></div>

      <div class="chat-input-area" id="inputArea" style="display: none">
        <div class="input-wrapper">
          <input
            type="text"
            id="userMessage"
            placeholder="Type your message..."
            autocomplete="off"
          />
          <button class="btn-send" id="sendBtn" title="Send message">
            <span>▶</span>
          </button>
        </div>
      </div>

      <div class="status-bar" id="statusBar"></div>
    </div>

    <script>
      const setupPanel = document.getElementById("setupPanel");
      const messagesContainer = document.getElementById("messagesContainer");
      const inputArea = document.getElementById("inputArea");
      const userMessageInput = document.getElementById("userMessage");
      const sendBtn = document.getElementById("sendBtn");
      const startChatBtn = document.getElementById("startChatBtn");
      const statusBar = document.getElementById("statusBar");

      // Configure marked settings
      marked.setOptions({
        breaks: true,
        gfm: true,
      });

      // Form inputs
      const userNameInput = document.getElementById("userName");
      const userBackgroundInput = document.getElementById("userBackground");
      const dayNumberInput = document.getElementById("dayNumber");
      const sessionTypeInput = document.getElementById("sessionType");
      const taskAssignedInput = document.getElementById("taskAssigned");
      const quizAssignedInput = document.getElementById("quizAssigned");

      let conversationId = null;
      let userId = null;
      let sessionType = null;

      // Start chat
      startChatBtn.addEventListener("click", async () => {
        const userName = userNameInput.value.trim();
        const userBackground = userBackgroundInput.value.trim();
        const dayNumber = parseInt(dayNumberInput.value) || 5;
        sessionType = sessionTypeInput.value;
        userId = `user_${Date.now()}`;

        if (!userName) {
          alert("Please enter your name");
          return;
        }

        startChatBtn.disabled = true;
        startChatBtn.textContent = "Starting...";

        try {
          const response = await fetch("/api/newchats", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              user_id: userId,
              session_type: sessionType,
              user_context: {
                user_name: userName,
                user_background: userBackground,
                day_number: dayNumber,
                task_assigned: taskAssignedInput.value,
                quiz_assigned: quizAssignedInput.value,
              },
            }),
          });

          const data = await response.json();

          if (data.error) {
            showError(data.error);
            startChatBtn.disabled = false;
            startChatBtn.textContent = "Start Chat";
            return;
          }

          conversationId = data.conversation_id;
          setupPanel.classList.add("hidden");
          inputArea.style.display = "block";
          messagesContainer.innerHTML = "";

          // Add initial message
          addMessage(data.message, "assistant", data.timestamp);
          updateStatus("Connected");
          userMessageInput.focus();
        } catch (error) {
          showError("Failed to start chat: " + error.message);
          startChatBtn.disabled = false;
          startChatBtn.textContent = "Start Chat";
        }
      });

      // Send message
      sendBtn.addEventListener("click", sendMessage);
      userMessageInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      async function sendMessage() {
        const message = userMessageInput.value.trim();
        if (!message || !conversationId) return;

        userMessageInput.value = "";
        addMessage(message, "user");
        sendBtn.disabled = true;
        userMessageInput.disabled = true;

        // Show loading indicator
        const loadingId = "loading_" + Date.now();
        messagesContainer.innerHTML += `
                <div class="message" id="${loadingId}">
                    <div class="message-bubble">
                        <div class="loading">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                </div>
            `;
        messagesContainer.scrollTop = messagesContainer.scrollHeight;

        try {
          const response = await fetch("/api/chats", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              conversation_id: conversationId,
              user_id: userId,
              session_type: sessionType,
              message: message,
              user_context: {
                user_name: userNameInput.value,
                user_background: userBackgroundInput.value,
              },
            }),
          });

          const data = await response.json();
          document.getElementById(loadingId).remove();

          if (data.error) {
            showError(data.error);
          } else {
            addMessage(data.message, "assistant", data.timestamp);
          }
        } catch (error) {
          document.getElementById(loadingId).remove();
          showError("Failed to send message: " + error.message);
        } finally {
          sendBtn.disabled = false;
          userMessageInput.disabled = false;
          userMessageInput.focus();
        }
      }

      function addMessage(text, role, timestamp = null) {
        const messageDiv = document.createElement("div");
        messageDiv.className = `message ${role}`;

        const time = timestamp
          ? new Date(timestamp).toLocaleTimeString()
          : new Date().toLocaleTimeString();

        let content = '';
        if (role === 'assistant') {
          // Use marked to parse AI responses
          content = marked.parse(text);
        } else {
          // Keep normal escaping for user messages but keep line breaks
          content = escapeHtml(text).replace(/\n/g, '<br>');
        }

        messageDiv.innerHTML = `
                <div>
                    <div class="message-bubble">${content}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }

      function showError(error) {
        const errorDiv = document.createElement("div");
        errorDiv.className = "error";
        errorDiv.textContent = error;
        messagesContainer.insertBefore(errorDiv, messagesContainer.firstChild);
      }

      function updateStatus(status) {
        statusBar.textContent = `Status: ${status}`;
      }

      function escapeHtml(text) {
        const map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        };
        return text.replace(/[&<>"']/g, (m) => map[m]);
      }

      updateStatus("Ready to start");
    </script>
  </body>
</html>
